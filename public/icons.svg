<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="50%" stop-color="#7c4dff"/>
            <stop offset="100%" stop-color="#ff2bd6"/>
        </linearGradient>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- film frame -->
    <rect
            x="140"
            y="130"
            width="232"
            height="252"
            rx="28"
            stroke="url(#neon)"
            stroke-width="10"
            fill="none"
            filter="url(#glow)"
    />

    <!-- film holes left -->
    <rect x="155" y="150" width="18" height="18" rx="4" fill="#7c4dff"/>
    <rect x="155" y="190" width="18" height="18" rx="4" fill="#7c4dff"/>
    <rect x="155" y="230" width="18" height="18" rx="4" fill="#7c4dff"/>
    <rect x="155" y="270" width="18" height="18" rx="4" fill="#7c4dff"/>
    <rect x="155" y="310" width="18" height="18" rx="4" fill="#7c4dff"/>

    <!-- film holes right -->
    <rect x="339" y="150" width="18" height="18" rx="4" fill="#00e5ff"/>
    <rect x="339" y="190" width="18" height="18" rx="4" fill="#00e5ff"/>
    <rect x="339" y="230" width="18" height="18" rx="4" fill="#00e5ff"/>
    <rect x="339" y="270" width="18" height="18" rx="4" fill="#00e5ff"/>
    <rect x="339" y="310" width="18" height="18" rx="4" fill="#00e5ff"/>

    <!-- play button -->
    <path
            d="M235 210 L235 300 L310 255 Z"
            fill="url(#neon)"
            filter="url(#glow)"
    />
</svg>